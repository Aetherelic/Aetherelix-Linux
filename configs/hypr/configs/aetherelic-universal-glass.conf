# =========================================================
# Aetherelic universal glass / blur
# Applies global transparency and blur to normal app windows.
# =========================================================

decoration {
    active_opacity = 0.86
    inactive_opacity = 0.78
    fullscreen_opacity = 1.00

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = false
        xray = false
        vibrancy = 0.18
        popups = true
    }

    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = rgba(00000088)
        color_inactive = rgba(00000055)
    }
}
